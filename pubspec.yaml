name: akom_scanner
description: "Application mobile Akôm Scanner — Catalogue, Inventaire, Caisse."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.5.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0

  # Auth & Backend
  supabase_flutter: ^2.9.0

  # Base de données locale offline (SQLite)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26

  # Scanner code-barres
  mobile_scanner: ^6.0.10

  # Son de confirmation au scan
  audioplayers: ^6.1.0

  # QR code
  qr_flutter: ^4.1.0

  # PDF & impression
  pdf: ^3.11.1
  printing: ^5.14.0

  # Impression thermique Bluetooth (Phase 8)
  flutter_thermal_printer: ^2.0.1
  esc_pos_utils_plus: ^2.0.3

  # Variables d'environnement embarquées dans l'app
  flutter_dotenv: ^5.2.1

  # Stockage local léger
  shared_preferences: ^2.3.5

  # Connectivité réseau
  connectivity_plus: ^6.1.3

  # Internationalisation & formatage
  intl: ^0.19.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Code generation (modèles)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  sqlite3: any

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

  # Linting
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # Icône & splash screen
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/sounds/
    - .env.development
    - .env.production

# ── Configuration icône d'application ────────────────────────────────────────
# Logo aligné sur la charte web (même wordmark que components/ui/logo.tsx et favicon.svg)
# Exécuter : dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F172A"  # Marine (fond du favicon/wordmark web)
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 26

# ── Configuration splash screen ───────────────────────────────────────────────
# Exécuter : dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0F172A"          # Marine (identique au fond du favicon web)
  color_dark: "#0F172A"
  android: true
  ios: false
  android_gravity: center
  fullscreen: true
